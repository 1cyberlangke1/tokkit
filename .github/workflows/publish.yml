# 预期行为：推送版本 tag 或手动触发时，验证仓库后发布 npm 包。
name: Publish Package

on:
  # 输入：形如 v1.0.1 的 tag 或手动触发。
  # 输出：执行一次完整的 npm 发布流程。
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish
